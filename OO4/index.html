<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Login Form | Ludiflex</title>
    <!-- BOXICONS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="form-container login-container">
      <div class="form-title">
        <span>Welcome Back</span>
        <p>Please Enter your Account details</p>
      </div>
      <div class="error-message">Wrong email and password</div>
      <div class="form-inputs">
        <div class="input-box">
          <input
            type="text"
            class="inputs input-field"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="password"
            id="password"
            class="inputs input-field"
            placeholder="Password"
            required
          />
          <ion-icon
            name="eye-outline"
            id="view-pass-icon"
            onclick="viewPass()"
          ></ion-icon>
        </div>
      </div>
      <div class="forgot-pass">
        <a href="#">Forgot password</a>
      </div>
      <div class="input-box">
        <button class="inputs submit-btn">
          <span>Sign In</span>
          <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>
      </div>
      <div class="form-bottom-links">
        <span>Don't have an account? <a href="register.html"> Sign Up</a></span>
      </div>
    </div>

    <script src="assets/js/main.js"></script>
    <!-- Web Icons Import -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
